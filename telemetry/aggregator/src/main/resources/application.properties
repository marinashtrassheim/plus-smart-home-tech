# Kafka settings
kafka.bootstrap-servers=localhost:9092

# Consumer settings
kafka.consumer.group-id=aggregator-group
kafka.consumer.max-poll-records=100
kafka.consumer.fetch-max-bytes=3072000
kafka.consumer.max-partition-fetch-bytes=307200
kafka.consumer.poll-timeout-ms=1000

# Producer settings
kafka.producer.acks=all
kafka.producer.retries=3
kafka.producer.batch-size=16384
kafka.producer.linger-ms=10
kafka.producer.buffer-memory=33554432
kafka.producer.compression-type=snappy

# Topic names
kafka.topic.sensors=telemetry.sensors.v1
kafka.topic.snapshots=telemetry.snapshots.v1

# Logging
logging.level.ru.yandex.practicum.aggregator=INFO
logging.level.org.apache.kafka=INFO

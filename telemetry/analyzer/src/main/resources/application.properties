# ==================== Spring Boot ====================
server.port=8081
spring.application.name=analyzer
# ==================== Datasource ====================
spring.datasource.driver-class-name=org.postgresql.Driver
# ????????? ?????????? (????? ?????????????? ??? ???????, ???? ????? ?????? URL/????????????)
spring.datasource.url=jdbc:postgresql://localhost:5432/analyzerdb
spring.datasource.username=postgres
spring.datasource.password=password
# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
# ==================== Kafka ====================
kafka.bootstrap-servers=localhost:9092
# Consumer for Snapshots (high intensity, manual commit)
kafka.consumer.snapshot.group-id=analyzer-snapshot-group
kafka.consumer.snapshot.max-poll-records=10
kafka.consumer.snapshot.enable-auto-commit=false
kafka.consumer.snapshot.poll-timeout-ms=1000
# Consumer for Hub Events (low intensity, auto commit)
kafka.consumer.hub.group-id=analyzer-hub-group
kafka.consumer.hub.max-poll-records=100
kafka.consumer.hub.enable-auto-commit=true
kafka.consumer.hub.auto-commit-interval=5000
kafka.consumer.hub.poll-timeout-ms=1000
# Common consumer settings
kafka.consumer.fetch-max-bytes=3072000
kafka.consumer.max-partition-fetch-bytes=307200
# Topics
kafka.topic.snapshots=telemetry.snapshots.v1
kafka.topic.hubs=telemetry.hubs.v1
# ==================== gRPC Client (Hub Router) ====================
grpc.client.hub-router.address=static://localhost:59090
grpc.client.hub-router.enableKeepAlive=true
grpc.client.hub-router.keepAliveWithoutCalls=true
grpc.client.hub-router.negotiationType=plaintext
# ==================== Logging ====================
logging.level.ru.yandex.practicum.analyzer=DEBUG
logging.level.org.apache.kafka=WARN
logging.level.org.hibernate.SQL=WARN
logging.level.org.springframework.transaction=DEBUG
logging.level.org.hibernate.engine.transaction=DEBUG
logging.file.name=analyzer.log
logging.file.path=./logs
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.r2dbc.R2dbcAutoConfiguration